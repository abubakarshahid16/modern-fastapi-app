<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" rx="36" fill="#061126"/>
  <rect x="56" y="56" width="1488" height="788" rx="30" fill="#0A1730" stroke="#16395D"/>
  <text x="112" y="144" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="700">Architecture Overview</text>
  <rect x="112" y="262" width="292" height="380" rx="28" fill="#102346"/>
  <text x="146" y="320" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 01</text>
  <text x="146" y="378" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Frontend</text>
  <text x="146" y="444" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">React, Vite, TypeScript, and dashboard-style UI flows for user-facing interaction.</text>
  <rect x="470" y="262" width="292" height="380" rx="28" fill="#102346"/>
  <text x="504" y="320" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 02</text>
  <text x="504" y="378" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">API</text>
  <text x="504" y="444" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">FastAPI endpoints with typed request and response models for clean backend development.</text>
  <rect x="828" y="262" width="292" height="380" rx="28" fill="#102346"/>
  <text x="862" y="320" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 03</text>
  <text x="862" y="378" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Data</text>
  <text x="862" y="444" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">PostgreSQL and SQLModel-backed persistence for application data and domain entities.</text>
  <rect x="1186" y="262" width="246" height="380" rx="28" fill="#102346"/>
  <text x="1218" y="320" fill="#8CD3FF" font-family="Arial, sans-serif" font-size="18">Layer 04</text>
  <text x="1218" y="378" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">DevOps</text>
  <text x="1218" y="444" fill="#D8E5F2" font-family="Arial, sans-serif" font-size="20">Docker Compose and a clean local developer workflow for full-stack iteration.</text>
  <path d="M404 452H470" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M762 452H828" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
  <path d="M1120 452H1186" stroke="#1EE7D4" stroke-width="10" stroke-linecap="round"/>
</svg>
